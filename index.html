<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="refresh" content="2;url=SellerProfile.html" />
  <title>Delight.pk</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Animated Gradient Background */
    .bg-gradient {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, 
        rgba(239, 108, 0, 0.4) 0%, 
        rgba(255, 87, 34, 0.2) 25%, 
        rgba(156, 39, 176, 0.2) 50%, 
        rgba(33, 150, 243, 0.2) 75%, 
        transparent 100%);
      animation: rotateGradient 10s linear infinite;
      z-index: 0;
    }

    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    /* Glassmorphism Card */
    .loader-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: cardEntry 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
    }

    @keyframes cardEntry {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo Container with Glow */
    .logo-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #ef6c00,
        #ff5722,
        #e91e63,
        #9c27b0,
        #2196f3,
        #ef6c00
      );
      animation: spinGlow 3s linear infinite;
      filter: blur(15px);
      opacity: 0.6;
    }

    @keyframes spinGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .logo-wrap img {
      position: relative;
      z-index: 2;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.2);
      background: #fff;
      animation: pulseLogo 2s ease-in-out infinite;
    }

    @keyframes pulseLogo {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Brand Text */
    .brand-text {
      text-align: center;
      color: white;
    }

    .brand-text h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 0%, #ffb74d 50%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shineText 3s linear infinite;
    }

    @keyframes shineText {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .brand-text p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 5px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Progress Section */
    .progress-section {
      width: 100%;
      max-width: 280px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      font-weight: 600;
    }

    .progress-percent {
      color: #ffb74d;
      font-weight: 800;
    }

    /* Multi-color Progress Bar */
    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 50px;
      background: linear-gradient(90deg, 
        #ef6c00 0%, 
        #ff5722 25%, 
        #e91e63 50%, 
        #9c27b0 75%, 
        #2196f3 100%
      );
      background-size: 200% 100%;
      animation: fillBar 2s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                 gradientMove 2s linear infinite;
      box-shadow: 0 0 20px rgba(239, 108, 0, 0.5);
    }

    @keyframes fillBar {
      0% { width: 0%; }
      20% { width: 30%; }
      50% { width: 60%; }
      80% { width: 85%; }
      100% { width: 100%; }
    }

    @keyframes gradientMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* Loading Dots */
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      justify-content: center;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: #ef6c00;
      border-radius: 50%;
      animation: bounceDots 1.4s ease-in-out infinite both;
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.32s; background: #ef6c00; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; background: #e91e63; }
    .loading-dots span:nth-child(3) { animation-delay: 0s; background: #2196f3; }

    @keyframes bounceDots {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .loader-card {
        padding: 40px 30px;
        margin: 20px;
      }
      
      .logo-wrap {
        width: 110px;
        height: 110px;
      }
      
      .logo-wrap img {
        width: 90px;
        height: 90px;
      }
      
      .brand-text h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Main Loader Card -->
  <div class="loader-card">
    <!-- Logo with Glow -->
    <div class="logo-wrap">
      <img src="Delight icons/Loading.png" alt="Delight Logo" />
    </div>

    <!-- Brand Text -->
    <div class="brand-text">
      <h1>DELIGHT.PK</h1>
      <p>~~~~~~~Loading~~~~~~~</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
      <div class="progress-info">
        <span>Initializing</span>
        <span class="progress-percent" id="percent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- Animated Dots -->
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <script>
    // Generate random floating particles
    const particlesContainer = document.getElementById('particles');
    const colors = ['#ef6c00', '#ff5722', '#e91e63', '#9c27b0', '#2196f3', '#fff'];
    
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];
      particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
      particlesContainer.appendChild(particle);
    }

    // Animate percentage counter - 2 seconds total
    const percentEl = document.getElementById('percent');
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 25;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
      }
      percentEl.textContent = Math.floor(progress) + '%';
    }, 150);
  </script>

</body>
</html>
