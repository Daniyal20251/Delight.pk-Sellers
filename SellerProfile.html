<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Profile - Delight.pk</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ===== ROOT VARIABLES ===== */
:root {
  --bg-body: #f4f6f8;
  --bg-card: #fff;
  --bg-input: #fafafa;
  --bg-linkbox: #f0f8ff;
  --bg-linkbox-border: #ef6c00;
  --text-primary: #333;
  --text-secondary: #666;
  --text-heading: #ef6c00;
  --text-welcome: #ef6c00;
  --border-input: #ccc;
  --shadow-card: 0 4px 14px rgba(0,0,0,0.1);
  --shadow-pic: 0 4px 10px rgba(0,0,0,0.2);
  --btn-hover: #d55c00;
  --bottom-bar-bg: #fff;
  --bottom-bar-border: #f0f0f0;
  --bottom-bar-text: #999;
  --loader-bg: #ffffff;
  --toast-bg: #fff;
  --toast-text: #222;
  --toast-msg: #666;
  --btn-secondary-bg: linear-gradient(135deg, #667eea, #764ba2);
  --btn-secondary-hover: linear-gradient(135deg, #5a6fd6, #6a4190);
}

/* ===== DARK MODE VARIABLES ===== */
[data-theme="dark"] {
  --bg-body: #0a0a1a;
  --bg-card: #16162a;
  --bg-input: #1e1e3a;
  --bg-linkbox: #1a1a2e;
  --bg-linkbox-border: #ff8c00;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0c0;
  --text-heading: #ff8c00;
  --text-welcome: #ff8c00;
  --border-input: #2a2a4a;
  --shadow-card: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-pic: 0 4px 15px rgba(0,0,0,0.6);
  --btn-hover: #ff8c00;
  --bottom-bar-bg: #16162a;
  --bottom-bar-border: #2a2a4a;
  --bottom-bar-text: #8888aa;
  --loader-bg: #0a0a1a;
  --toast-bg: #16162a;
  --toast-text: #e8e8f0;
  --toast-msg: #a0a0c0;
  --btn-secondary-bg: linear-gradient(135deg, #5a6fd6, #6a4190);
  --btn-secondary-hover: linear-gradient(135deg, #4e63c4, #5e3580);
}

body{
  font-family:'Segoe UI',sans-serif;
  background: var(--bg-body);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:30px 15px 80px;
  transition: background 0.5s ease;
}

/* ===== PROFESSIONAL DARK MODE TOGGLE (SLIDER) ===== */
.theme-switch-wrapper {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 100000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-switch-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  transition: color 0.4s ease;
  opacity: 0.8;
}

.theme-switch {
  position: relative;
  width: 56px;
  height: 30px;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(239, 108, 0, 0.3), inset 0 1px 3px rgba(255,255,255,0.2);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  border: 2px solid transparent;
}

.theme-switch::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-switch .switch-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  transition: all 0.3s ease;
  pointer-events: none;
}

.theme-switch .switch-sun {
  left: 8px;
  color: #fff;
  opacity: 1;
}

.theme-switch .switch-moon {
  right: 8px;
  color: #fff;
  opacity: 0.5;
}

/* Dark mode active state */
[data-theme="dark"] .theme-switch {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3), inset 0 1px 3px rgba(255,255,255,0.1);
}

[data-theme="dark"] .theme-switch::before {
  left: calc(100% - 26px);
  background: #1e1e3a;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

[data-theme="dark"] .theme-switch .switch-sun {
  opacity: 0.5;
}

[data-theme="dark"] .theme-switch .switch-moon {
  opacity: 1;
}

.theme-switch:active::before {
  width: 26px;
}

/* ===== LOADER ===== */
#loaderOverlay {
  position: fixed;
  inset: 0;
  background: var(--loader-bg);
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease, visibility 0.6s ease, background 0.4s ease;
}
#loaderOverlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loader-ring {
  width: 64px;
  height: 64px;
  border: 4px solid #ffe0b2;
  border-top: 4px solid #ef6c00;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.loader-text {
  margin-top: 18px;
  color: var(--text-heading);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  transition: color 0.4s ease;
}

/* ===== CONTAINER ===== */
.container{
  background: var(--bg-card);
  border-radius:20px;
  box-shadow: var(--shadow-card);
  padding:28px 22px 32px;
  max-width:430px;
  width:100%;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease, background 0.4s ease, box-shadow 0.4s ease;
  margin-top: 10px;
}
.container.loaded {
  opacity: 1;
  transform: translateY(0);
}
h2{
  color: var(--text-heading);
  text-align:center;
  margin-bottom:25px;
  font-size:20px;
  font-weight: 700;
  transition: color 0.4s ease;
}
.profile-row{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}
.profile-pic{
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  background:#444444;
  box-shadow: var(--shadow-pic);
  cursor:pointer;
  position:relative;
  flex-shrink:0;
  transition: box-shadow 0.4s ease;
}
.profile-pic img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.plus-sign{
  font-size:32px;
  color:white;
  font-weight:bold;
  text-shadow:0 2px 6px rgba(0,0,0,0.6);
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
.info-box{
  flex-grow:1;
}
.info-box input{
  width:100%;
  border:1px solid var(--border-input);
  border-radius:12px;
  padding:12px 14px;
  font-size:15px;
  background: var(--bg-input);
  color: var(--text-primary);
  transition: all 0.4s ease;
  outline: none;
}
.info-box input:focus {
  border-color: #ef6c00;
  box-shadow: 0 0 0 3px rgba(239, 108, 0, 0.15);
}
label{
  display:block;
  font-weight:600;
  margin-bottom:8px;
  color: var(--text-primary);
  transition: color 0.4s ease;
  font-size: 14px;
}
input[type="number"]{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--border-input);
  border-radius:12px;
  font-size:15px;
  margin-bottom:18px;
  background: var(--bg-input);
  color: var(--text-primary);
  transition: all 0.4s ease;
  outline: none;
}
input[type="number"]:focus {
  border-color: #ef6c00;
  box-shadow: 0 0 0 3px rgba(239, 108, 0, 0.15);
}

/* ===== PROFESSIONAL BUTTONS ===== */
.btn-primary {
  width:100%;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  color:white;
  border:none;
  padding:8px 0;
  border-radius:12px;
  font-size:16px;
  font-weight: 600;
  cursor:pointer;
  transition: all 0.3s ease;
  margin-top:10px;
  box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3);
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}
.btn-primary:hover::before {
  left: 100%;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 106, 0, 0.4);
}
.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  width:100%;
  background: var(--btn-secondary-bg);
  color:white;
  border:none;
  padding:8px 0;
  border-radius:12px;
  font-size:16px;
  font-weight: 600;
  cursor:pointer;
  transition: all 0.3s ease;
  margin-top:12px;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  position: relative;
  overflow: hidden;
}
.btn-secondary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}
.btn-secondary:hover::before {
  left: 100%;
}
.btn-secondary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}
.btn-secondary:active {
  transform: translateY(0);
}

.btn-danger {
  width:100%;
  background: linear-gradient(135deg, #dc3545, #c82333);
  color:white;
  border:none;
  padding:8px 0;
  border-radius:12px;
  font-size:16px;
  font-weight: 600;
  cursor:pointer;
  transition: all 0.3s ease;
  margin-top:6px;
  box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
}
.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
}

.btn-success {
  width:100%;
  background: linear-gradient(135deg, #28a745, #20c997);
  color:white;
  border:none;
  padding:10px 0;
  border-radius:12px;
  font-size:16px;
  font-weight: 600;
  cursor:pointer;
  transition: all 0.3s ease;
  margin-top:12px;
  box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
}
.btn-success:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
}

#welcomeText{
  text-align:center;
  margin-top:100px;
  color: var(--text-welcome);
  font-size:13px;
  font-weight:bold;
  transition: color 0.4s ease;
}

/* ===== NOTIFICATION BADGE ===== */
.nav-badge {
  position: absolute;
  top: -6px;
  right: 6px;
  background: #ff3d00;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  box-shadow: 0 2px 6px rgba(255, 61, 0, 0.4);
  animation: pulse-badge 2s infinite;
  z-index: 10;
}
@keyframes pulse-badge {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* ===== TOAST NOTIFICATION ===== */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 90%;
  max-width: 400px;
}
.toast {
  background: var(--toast-bg);
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 14px;
  animation: slideDown 0.4s ease, fadeOut 0.4s ease 4.6s forwards;
  border-left: 5px solid #ff6a00;
  position: relative;
  overflow: hidden;
  transition: background 0.4s ease;
}
.toast::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, #ff6a00, #ff3d00);
  animation: progress 5s linear forwards;
}
@keyframes slideDown {
  from { transform: translateY(-30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-20px); }
}
@keyframes progress {
  from { width: 100%; }
  to { width: 0%; }
}
.toast-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
}
.toast-content { flex: 1; }
.toast-title {
  font-weight: 700;
  color: var(--toast-text);
  font-size: 15px;
  margin-bottom: 3px;
  transition: color 0.4s ease;
}
.toast-msg {
  color: var(--toast-msg);
  font-size: 13px;
  line-height: 1.4;
  transition: color 0.4s ease;
}

/* ===== PROFESSIONAL BOTTOM BAR ===== */
.bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background: var(--bottom-bar-bg);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 0 12px;
  z-index:9999;
  box-shadow:0 -4px 14px rgba(0,0,0,0.08);
  border-top:1px solid var(--bottom-bar-border);
  transition: all 0.4s ease;
}
.bar a{
  text-decoration:none;
  color: var(--bottom-bar-text);
  text-align:center;
  font-size:11px;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:6px 16px;
  border-radius:12px;
  transition: all 0.3s ease;
  position: relative;
}
.bar a i{
  font-size:20px;
  transition: all 0.3s ease;
}
.bar a:hover {
  color: #ef6c00;
}
.bar a.active {
  color: #ef6c00;
}
.bar a.active::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 3px;
  background: #ef6c00;
  border-radius: 2px;
}
.bar a.active i {
  transform: translateY(-2px);
}

/* Store Link Styles */
.store-link-box{
  background: var(--bg-linkbox);
  border:2px dashed var(--bg-linkbox-border);
  border-radius:12px;
  padding:18px;
  margin:18px 0;
  text-align:center;
  transition: all 0.4s ease;
}
.store-link-box p{
  font-size:14px;
  color: var(--text-primary);
  margin-bottom:10px;
  font-weight:600;
  transition: color 0.4s ease;
}
.store-link-box a{
  color: var(--text-heading);
  text-decoration:none;
  font-size:13px;
  word-break:break-all;
  display:block;
  margin-bottom:12px;
  transition: color 0.4s ease;
}
.store-link-box button{
  background: linear-gradient(135deg, #28a745, #20c997);
  margin-top:5px;
  font-size:14px;
  padding:10px 0;
  border-radius: 10px;
}
.store-link-box button:hover{
  background: linear-gradient(135deg, #218838, #1ba87e);
}

/* ===== ADS BUTTON (Admin Only) ===== */
.ads-btn-wrapper {
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- Professional Dark Mode Toggle -->
<div class="theme-switch-wrapper">
  <div class="theme-switch" id="themeSwitch" onclick="toggleDarkMode()" title="Toggle Dark Mode">
    <i class="fas fa-sun switch-icon switch-sun"></i>
    <i class="fas fa-moon switch-icon switch-moon"></i>
  </div>
</div>

<!-- Loader Overlay -->
<div id="loaderOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Profile...</div>
</div>

<!-- Toast Notifications -->
<div class="toast-container" id="toastContainer"></div>

<div class="container" id="mainContainer">
  <h2>My Profile</h2>

  <div class="profile-row">
    <div class="profile-pic" id="profilePicContainer">
      <span class="plus-sign">+</span>
      <img id="profile-img" src="">
    </div>
    <div class="info-box">
      <input type="text" id="storeName" style="color:--text-primary; " placeholder="Your Store Name">
    </div>
  </div>

  <input type="file" id="file-upload" accept="image/*" style="display:none">

  <label for="deliveryInput">Delivery Charges (Rs.)</label>
  <input type="number" id="deliveryInput" placeholder="200">

  <button class="btn-primary" onclick="updateProfile()">💾 Save & Continue</button>

  <!-- Store Link -->
  <div class="store-link-box" id="storeLinkBox" style="display:none;">
    <p>🔗 Your Store Link</p>
    <a id="storeLink" href="#" target="_blank"></a>
    <button class="btn-success" onclick="copyStoreLink()">📋 Copy Link</button>
  </div>

  <button class="btn-primary" id="uploadBtn" onclick="goToSellerPanel()">📤 Upload Product</button>

  <!-- Upload Ads Button (Admin Only - 03133196595) -->
  <div class="ads-btn-wrapper" id="adsBtnWrapper" style="display:none;">
    <button class="btn-secondary" onclick="goToUploadAds()">📢 Upload Ads</button>
  </div>

  <h2 id="welcomeText"></h2>
  <button class="btn-danger" onclick="logout()">🚪 Logout</button>
</div>

<!-- Professional Bottom Bar -->
<div class="bar">
  <a href="myStore.html" onclick="goToMyStore()">
    <i class="fas fa-store"></i>
    Store
  </a>
  <a href="sellerOrders.html" onclick="goToOrders()" id="nav-orders">
    <i class="fas fa-box"></i>
    My Orders
    <span class="nav-badge" id="orderBadge" style="display:none;">0</span>
  </a>
  <a href="SellerProfile.html" class="active">
    <i class="fas fa-user"></i>
    Profile
  </a>
</div>

<script>
// ===== DARK MODE SYSTEM =====
const themeSwitch = document.getElementById("themeSwitch");

// Check saved dark mode preference
function initDarkMode() {
  const isDark = localStorage.getItem("darkMode") === "true";
  if (isDark) {
    document.documentElement.setAttribute("data-theme", "dark");
  } else {
    document.documentElement.removeAttribute("data-theme");
  }
}

// Toggle dark mode
function toggleDarkMode() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  
  if (isDark) {
    document.documentElement.removeAttribute("data-theme");
    localStorage.setItem("darkMode", "false");
    showToast("☀️ Light Mode", "Switched to light theme", "fa-sun");
  } else {
    document.documentElement.setAttribute("data-theme", "dark");
    localStorage.setItem("darkMode", "true");
    showToast("🌙 Dark Mode", "Switched to dark theme", "fa-moon");
  }
}

// Initialize dark mode on page load
initDarkMode();

const profileImg = document.getElementById("profile-img");
const plusSign = document.querySelector(".plus-sign");
const storeInput = document.getElementById("storeName");
const fileInput = document.getElementById("file-upload");
const profileContainer = document.getElementById("profilePicContainer");
const deliveryInput = document.getElementById("deliveryInput");
const storeLinkBox = document.getElementById("storeLinkBox");
const storeLink = document.getElementById("storeLink");
const loaderOverlay = document.getElementById("loaderOverlay");
const mainContainer = document.getElementById("mainContainer");
const adsBtnWrapper = document.getElementById("adsBtnWrapper");

profileContainer.addEventListener("click", ()=> fileInput.click());

// Login check
const seller = JSON.parse(localStorage.getItem("seller"));
if(!seller){
  window.location.href="signup.html";
}

// ===== ADMIN CHECK - Show Upload Ads only for 03133196595 =====
function checkAdminAccess() {
  if (seller && seller.phone === "03352166725") {
    adsBtnWrapper.style.display = "block";
  }
}

// ===== NOTIFICATION SYSTEM =====
let lastOrderCount = 0;
let checkedOnce = false;

function showToast(title, message, icon = "fa-bell") {
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerHTML = `
    <div class="toast-icon"><i class="fas ${icon}"></i></div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${message}</div>
    </div>
  `;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}

function updateBadge(count) {
  const badge = document.getElementById("orderBadge");
  if (!badge) return;
  
  if (count > 0) {
    badge.textContent = count > 99 ? "99+" : count;
    badge.style.display = "flex";
    
    if (checkedOnce && count > lastOrderCount) {
      const newOrders = count - lastOrderCount;
      showToast(
        "🛒 New Order" + (newOrders > 1 ? "s" : "") + "!", 
        `${newOrders} new order${newOrders > 1 ? 's' : ''} received. Ship them now!`,
        "fa-box-open"
      );
    }
  } else {
    badge.style.display = "none";
  }
  
  lastOrderCount = count;
  checkedOnce = true;
}

async function checkNewOrders() {
  try {
    const res = await fetch(`https://delight-backend--araindaniyalo2.replit.app/seller-orders/${seller.phone}`);
    const orders = await res.json();
    
    if (!orders || !Array.isArray(orders)) return;
    
    const pendingCount = orders.filter(o => o.status === "Pending").length;
    updateBadge(pendingCount);
    
  } catch (err) {
    console.error("Order check failed:", err);
  }
}

// Generate Store Link
function generateStoreLink(){
  const phone = seller.phone;
  const link = `https://delightpk.qzz.io/Store.html?phone=${phone}`;
  storeLink.href = link;
  storeLink.innerText = link;
  storeLinkBox.style.display = "block";
}

// Copy Store Link
function copyStoreLink(){
  const link = storeLink.href;
  navigator.clipboard.writeText(link).then(() => {
    showToast("✅ Copied!", "Store link copied to clipboard", "fa-check");
  }).catch(() => {
    const input = document.createElement("input");
    input.value = link;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    document.body.removeChild(input);
    showToast("✅ Copied!", "Store link copied to clipboard", "fa-check");
  });
}

// Load existing settings
async function loadSettings(){
  try{
    const res = await fetch(`https://delight-backend--araindaniyalo2.replit.app/settings?phone=${seller.phone}`);
    const data = await res.json();
    if(data.logo){ profileImg.src=data.logo; profileImg.style.display="block"; plusSign.style.display="none"; }
    if(data.name){ storeInput.value=data.name; document.getElementById("welcomeText").innerText="Hello, "+data.name+" 👋"; }
    else { document.getElementById("welcomeText").innerText="Hello, "+(seller.name || "Seller")+" 👋"; }
    if(data.delivery){ deliveryInput.value = data.delivery; }

    generateStoreLink();
    await checkNewOrders();
    checkAdminAccess();

  }catch(err){ console.error(err); }
}

// Smooth loading sequence
window.addEventListener("load", async () => {
  await loadSettings();

  setTimeout(() => {
    loaderOverlay.classList.add("hidden");
    mainContainer.classList.add("loaded");
  }, 10);
});

// Update profile
async function updateProfile(){
  const formData = new FormData();
  formData.append("phone", seller.phone);
  formData.append("name", storeInput.value);
  formData.append("delivery", deliveryInput.value);
  if(fileInput.files[0]) formData.append("logo", fileInput.files[0]);

  try{
    const res = await fetch(`https://delight-backend--araindaniyalo2.replit.app/update-settings`, { method:"POST", body:formData });
    const data = await res.json();

    if(data.success){ 
      document.getElementById("welcomeText").innerText="Hello, "+storeInput.value+" 👋"; 
      if(data.seller.logo) profileImg.src = data.seller.logo;
      plusSign.style.display="none";
      showToast("✅ Success!", "Store updated successfully", "fa-check");
    } else { showToast("⚠️ Error", data.message || "Something went wrong", "fa-exclamation-triangle"); }
  }catch(err){ console.error(err); showToast("⚠️ Error", "Cannot update store", "fa-exclamation-triangle"); }
}

function goToSellerPanel(){

}

// Go to Upload Ads (Admin only)
function goToUploadAds(){
  window.location.href="Sellers Ads.html";
}

// My Store from bar
function goToMyStore(){
  localStorage.setItem("sellerPhone", seller.phone);

// Go to Orders Page
function goToOrders(){ 
  localStorage.setItem("sellerOrdersData", JSON.stringify({name: storeInput.value || seller.name, phone: seller.phone}));
  window.location.href="sellerOrders.html";
}

// Logout
function logout(){ 
  localStorage.removeItem("seller");
  window.location.href="login.html"; 
}

// Real-time polling
setInterval(checkNewOrders, 10000);
