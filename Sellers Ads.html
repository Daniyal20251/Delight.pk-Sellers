<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delight.pk - Seller Ads</title>
<style>
:root {
  --bg-body: #fdfdfd;
  --bg-card: #fff;
  --bg-input: #f5f5f5;
  --bg-file-input: #fafafa;
  --bg-ad-slot: #f9f9f9;
  --bg-ad-slot-hover: #fff8e1;
  --bg-modal: #fff;
  --bg-btn-cancel: #eee;
  --bg-btn-cancel-hover: #ddd;
  --text-primary: #333;
  --text-secondary: #888;
  --text-heading: #ef6c00;
  --border-color: #ccc;
  --border-dashed: #ccc;
  --shadow-card: 0 4px 12px rgba(0,0,0,0.15);
  --overlay-bg: rgba(0,0,0,0.6);
}

[data-theme="dark"] {
  --bg-body: #0a0a1a;
  --bg-card: #16162a;
  --bg-input: #1e1e3a;
  --bg-file-input: #1a1a2e;
  --bg-ad-slot: #16162a;
  --bg-ad-slot-hover: #1e1e3a;
  --bg-modal: #16162a;
  --bg-btn-cancel: #2a2a4a;
  --bg-btn-cancel-hover: #3a3a5a;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0c0;
  --text-heading: #ff8c00;
  --border-color: #2a2a4a;
  --border-dashed: #3a3a5a;
  --shadow-card: 0 4px 20px rgba(0,0,0,0.5);
  --overlay-bg: rgba(0,0,0,0.8);
}

/* Smooth transitions for all theme changes */
* {
  transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

/* ===== DARK MODE TOGGLE BUTTON ===== */
.theme-switch-wrapper {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 100000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-switch {
  position: relative;
  width: 56px;
  height: 30px;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(239, 108, 0, 0.3), inset 0 1px 3px rgba(255,255,255,0.2);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  border: 2px solid transparent;
}

.theme-switch::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.theme-switch .switch-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  transition: all 0.3s ease;
  pointer-events: none;
}

.theme-switch .switch-sun { left: 8px; color: #fff; opacity: 1; }
.theme-switch .switch-moon { right: 8px; color: #fff; opacity: 0.5; }

[data-theme="dark"] .theme-switch {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3), inset 0 1px 3px rgba(255,255,255,0.1);
}

[data-theme="dark"] .theme-switch::before {
  left: calc(100% - 26px);
  background: #1e1e3a;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

[data-theme="dark"] .theme-switch .switch-sun { opacity: 0.5; }
[data-theme="dark"] .theme-switch .switch-moon { opacity: 1; }

* { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Segoe UI', sans-serif; 
    max-width: 480px; 
    margin: auto; 
    padding: 20px; 
    background: var(--bg-body); 
    color: var(--text-primary); 
  }
  h2 { text-align: center; margin-bottom: 20px; color: var(--text-heading); }

  /* 7 HORIZONTAL AD SLOTS */
  .ad-slot {
    width: 100%;
    height: 140px;
    border: 2px dashed var(--border-dashed);
    border-radius: 12px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--bg-ad-slot);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .ad-slot:hover {
    border-color: var(--text-heading);
    background: var(--bg-ad-slot-hover);
  }
  .ad-slot.has-ad {
    border: 2px solid var(--text-heading);
    background: var(--bg-card);
    cursor: default;
  }

  /* Plus icon for empty slots */
  .add-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    color: var(--text-secondary);
  }
  .add-icon .plus {
    font-size: 32px;
    font-weight: bold;
    color: var(--text-heading);
  }
  .add-icon span {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Ad content inside slot - HORIZONTAL IMAGE */
  .ad-content {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    position: relative;
  }
  .ad-content img {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .ad-content .ad-name {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    background: rgba(239, 108, 0, 0.85);
    padding: 4px 10px;
    border-radius: 6px;
    z-index: 2;
  }
  .ad-content .delete-btn {
    background: #ff4444;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 2;
  }
  .ad-content .delete-btn:hover {
    background: #cc0000;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--overlay-bg);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal-box {
    background: var(--bg-modal);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    animation: slideUp 0.3s ease;
    border: 1px solid var(--border-color);
  }
  @keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-box h3 {
    text-align: center;
    color: var(--text-heading);
    margin-bottom: 20px;
  }
  .modal-box input[type="text"] {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 12px;
    background: var(--bg-input);
    color: var(--text-primary);
  }
  .modal-box input[type="file"] {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border-dashed);
    border-radius: 8px;
    margin-bottom: 12px;
    background: var(--bg-file-input);
    color: var(--text-primary);
  }
  .modal-box .preview-img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 12px;
    display: none;
  }
  .modal-box .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .modal-box button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .modal-box .btn-save {
    background: var(--text-heading);
    color: #fff;
  }
  .modal-box .btn-save:hover {
    background: #d65c00;
  }
  .modal-box .btn-cancel {
    background: var(--bg-btn-cancel);
    color: var(--text-primary);
  }
  .modal-box .btn-cancel:hover {
    background: var(--bg-btn-cancel-hover);
  }

  .slot-label {
    position: absolute;
    top: 5px;
    left: 10px;
    font-size: 10px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.8);
    padding: 2px 6px;
    border-radius: 4px;
    z-index: 2;
  }
  [data-theme="dark"] .slot-label {
    background: rgba(22, 22, 42, 0.9);
    color: var(--text-secondary);
  }

</style>
</head>
<body>

<h2>📰 Seller - Manage Ads</h2>
<p style="text-align:center;color:#888;font-size:13px;margin-bottom:20px;">Click on any slot to add or edit your ad</p>

<!-- ===== 7 HORIZONTAL AD CONTAINERS ===== -->
<div id="adSlotsContainer"></div>

<!-- ===== ADD/EDIT MODAL ===== -->
<div class="modal-overlay" id="adModal">
  <div class="modal-box">
    <h3>🖼️ Add Ad</h3>
    <input type="text" id="adNameInput" placeholder="Ad Name" readonly>
    <input type="file" id="adImageInput" accept="image/*">
    <img id="previewImage" class="preview-img" alt="Preview">
    <div class="btn-group">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAd()">Save Ad</button>
    </div>
  </div>
</div>

<script>
const apiBase = "https://delight-backend--araindaniyalo2.replit.app";

// 🔥 FIXED AD NAMES FOR 7 SLOTS
const AD_NAMES = [
  "Cucu Collection",
  "Cucu Collection1",
  "Cucu Collection2", 
  "Cucu Collection3",
  "Cucu Collection4",
  "Cucu Collection5",
  "Cucu Collection6"
];

let currentSlotIndex = null;
let selectedFile = null;

// ===== LOAD ADS =====
async function loadAds() {
  try {
    const res = await fetch(`${apiBase}/admin/ads`);
    const ads = await res.json();

    console.log("📢 All ads from API:", ads);

    const container = document.getElementById("adSlotsContainer");
    container.innerHTML = "";

    // Create 7 slots
    for (let i = 0; i < 7; i++) {
      const slotName = AD_NAMES[i];

      // 🔥 FIXED: Find ad by EXACT name match only (to prevent duplicates)
      let ad = null;

      for (let a of ads) {
        const adName = getAdName(a).toLowerCase().trim();
        const searchName = slotName.toLowerCase().trim();

        // Only exact match - no contains/fuzzy
        if (adName === searchName) {
          ad = a;
          break; // Stop after first exact match
        }
      }

      console.log(`Slot ${i+1} (${slotName}) -> Matched ad:`, ad ? ad.id : "None");

      const slotDiv = document.createElement("div");
      slotDiv.className = `ad-slot ${ad ? 'has-ad' : ''}`;
      slotDiv.dataset.index = i;

      if (ad) {
        // Show existing ad - HORIZONTAL IMAGE
        // 🔥 Add cache-buster to prevent browser caching same image
        const imageUrl = ad.image ? `${ad.image}?cb=${Date.now()}_${i}` : 'https://via.placeholder.com/400x140';

        slotDiv.innerHTML = `
          <div class="ad-content">
            <span class="slot-label">Slot ${i+1}</span>
            <img src="${imageUrl}" alt="${slotName}" loading="eager">
            <span class="ad-name">${slotName}</span>
            <button class="delete-btn" onclick="event.stopPropagation(); deleteAd(${ad.id}, ${i})">Delete</button>
          </div>
        `;
      } else {
        // Show empty slot with plus
        slotDiv.innerHTML = `
          <span class="slot-label">Slot ${i+1}</span>
          <div class="add-icon">
            <span class="plus">+</span>
            <span>Add Ad</span>
          </div>
        `;
      }

      slotDiv.addEventListener("click", () => openModal(i));
      container.appendChild(slotDiv);
    }

  } catch(err) {
    console.error("Failed to load ads:", err);
    alert("Failed to load ads");
  }
}

// Helper to get ad name
function getAdName(ad) {
  const possibleFields = ['name', 'title', 'text', 'label', 'caption', 'heading', 'description', 'adName', 'adTitle'];
  for (let field of possibleFields) {
    if (ad[field] && typeof ad[field] === 'string') {
      return ad[field].trim();
    }
  }
  for (let key in ad) {
    if (typeof ad[key] === 'string' && ad[key].length < 100) {
      return ad[key].trim();
    }
  }
  return "";
}

// ===== MODAL FUNCTIONS =====
function openModal(index) {
  currentSlotIndex = index;
  document.getElementById("adNameInput").value = AD_NAMES[index];
  document.getElementById("adImageInput").value = "";
  document.getElementById("previewImage").style.display = "none";
  selectedFile = null;
  document.getElementById("adModal").classList.add("active");
}

function closeModal() {
  document.getElementById("adModal").classList.remove("active");
  currentSlotIndex = null;
  selectedFile = null;
}

// Preview image on file select
document.getElementById("adImageInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById("previewImage");
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

// ===== SAVE AD =====
async function saveAd() {
  if (!selectedFile) {
    alert("Please select an image");
    return;
  }

  const formData = new FormData();
  formData.append("title", AD_NAMES[currentSlotIndex]);
  formData.append("image", selectedFile);

  try {
    const res = await fetch(`${apiBase}/admin/add-ad`, {
      method: "POST",
      body: formData
    });
    const data = await res.json();

    if(data.success){
      alert("✅ Ad saved successfully!");
      closeModal();
      loadAds();
    } else {
      alert("❌ " + (data.message || "Failed to save ad"));
    }
  } catch(err){
    console.error(err);
    alert("Error saving ad");
  }
}

// ===== DELETE AD =====
async function deleteAd(id, slotIndex) {
  if(!confirm(`Are you sure you want to delete the ad for "${AD_NAMES[slotIndex]}"?`)) return;

  try {
    const res = await fetch(`${apiBase}/admin/delete-ad/${id}`, { method: "DELETE" });
    const data = await res.json();

    if(data.success){
      alert("✅ Ad deleted");
      loadAds();
    } else {
      alert("❌ " + (data.message || "Failed to delete"));
    }
  } catch(err){
    console.error(err);
    alert("Error deleting ad");
  }
}

// Close modal on overlay click
document.getElementById("adModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// Initial load
loadAds();
</script>
<script>
(function() {
  const isDark = localStorage.getItem("darkMode") === "true";
  if (isDark) document.documentElement.setAttribute("data-theme", "dark");
})();
</script>

</body>
</html>
